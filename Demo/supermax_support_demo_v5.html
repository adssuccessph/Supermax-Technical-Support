<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Supermax Technical Support Demo V2</title>
<style>
:root{
  --navy:#071c48;--navy2:#0b2c6d;--blue:#1765ec;--blue2:#0d53cb;
  --gold:#ffb800;--gold2:#ff9f00;--green:#1fa759;--red:#df4444;
  --orange:#ef8d1d;--ink:#14233f;--muted:#61708a;--line:#dbe5f1;
  --bg:#f4f8fd;--card:#ffffff;--shadow:0 12px 34px rgba(9,34,78,.10);
  --radius:18px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth;scroll-padding-top:84px}
body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--ink)}
button,input,select,textarea{font:inherit}
a{color:inherit}
button{cursor:pointer}
[hidden]{display:none!important}
.shell{width:min(1320px,calc(100% - 30px));margin:auto}
.brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:#fff;white-space:nowrap}
.brand-mark{width:42px;height:42px;display:grid;place-items:center;border:3px solid var(--gold);border-radius:13px;transform:rotate(30deg);font-weight:1000;color:var(--gold)}
.brand-mark span{transform:rotate(-30deg)}
.brand strong,.brand small{display:block}
.brand strong{font-size:20px;letter-spacing:.3px}
.brand small{font-size:9px;letter-spacing:1.1px;color:#d8e5f8}
.btn{border:0;border-radius:12px;padding:12px 18px;font-weight:900;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:.16s ease;line-height:1.1}
.btn:hover{transform:translateY(-1px);filter:brightness(.98)}
.btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
.btn-primary{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;box-shadow:0 8px 18px rgba(23,101,236,.25)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#17233b;box-shadow:0 8px 18px rgba(255,184,0,.25)}
.btn-light{background:#eef5ff;color:#184d9e;border:1px solid #cdddf7}
.btn-outline{background:#fff;color:#164f9f;border:1px solid #aac5ee}
.btn-danger{background:#fff1f1;color:#b62d2d;border:1px solid #f0c1c1}
.btn-success{background:#eaf8ef;color:#156d3d;border:1px solid #b5debf}
.btn-sm{padding:8px 11px;font-size:12px;border-radius:9px}
.btn-full{width:100%}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.muted{color:var(--muted)}
.small{font-size:12px}
.eyebrow{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:#eaf2ff;color:#1656bc;font-size:13px;font-weight:900}
.status{display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;font-size:11px;font-weight:1000;white-space:nowrap}
.status-new{background:#eaf2ff;color:#1656bc}
.status-accepted{background:#fff4d8;color:#9b6500}
.status-in-progress{background:#e8f2ff;color:#1656bc}
.status-waiting-customer{background:#f2e8ff;color:#7143ba}
.status-resolved{background:#e9f8ef;color:#16733e}
.status-overdue,.status-missed{background:#ffeaea;color:#be3232}
.avatar{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,#dce9ff,#bdd1f8);color:#124c9d;font-weight:1000;flex:0 0 auto}
.icon-box{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;background:#eaf2ff;color:var(--blue);font-size:21px;font-weight:1000}
input,select,textarea{width:100%;border:1px solid #d7e1ee;border-radius:10px;padding:12px 13px;background:#fff;color:var(--ink);outline:none}
input:focus,select:focus,textarea:focus{border-color:#74a1f1;box-shadow:0 0 0 3px rgba(23,101,236,.10)}
label{display:grid;gap:7px;font-size:12px;font-weight:900;color:#293a59}
textarea{min-height:120px;resize:vertical}
.form-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.file-chip{display:inline-flex;padding:6px 10px;border-radius:999px;background:#eaf2ff;color:#1555b8;font-size:11px;font-weight:900;margin:6px 6px 0 0}
.table-wrap{overflow:auto;border:1px solid #e1e8f2;border-radius:14px}
table{border-collapse:collapse;width:100%;font-size:12px;background:#fff}
th,td{padding:12px 10px;text-align:left;border-bottom:1px solid #e8edf4;vertical-align:middle}
th{font-size:11px;color:#55657d;background:#f8fbff}
td small{display:block;color:var(--muted);margin-top:4px}
tr:last-child td{border-bottom:0}
.action-row{display:flex;gap:6px;flex-wrap:wrap}
.toast{position:fixed;right:16px;bottom:16px;z-index:200;min-width:280px;max-width:440px;padding:14px 16px;border-radius:14px;background:#071d48;color:#fff;box-shadow:0 18px 46px rgba(4,21,54,.28);font-size:12px;font-weight:800;opacity:0;pointer-events:none;transform:translateY(20px);transition:.2s}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:#16753f}
.toast.error{background:#ad2e2e}

/* launcher */
.launcher{min-height:100vh;background:linear-gradient(135deg,#05183b 0 52%,#f4f8fd 52%);display:grid;place-items:center;padding:24px}
.launcher-wrap{width:min(1050px,100%);display:grid;grid-template-columns:1fr 1fr;background:#fff;border-radius:28px;overflow:hidden;box-shadow:0 34px 90px rgba(4,20,52,.22)}
.launcher-left{padding:54px;background:linear-gradient(145deg,#061d49,#0a3477);color:#fff}
.launcher-left h1{font-size:46px;line-height:1.08;margin:38px 0 16px}
.launcher-left h1 span{color:var(--gold)}
.launcher-left p{font-size:16px;line-height:1.7;color:#d4e1f6}
.launcher-points{display:grid;gap:13px;margin-top:24px}
.launcher-points article{padding:14px;border:1px solid rgba(255,255,255,.15);border-radius:14px;background:rgba(255,255,255,.05)}
.launcher-points b,.launcher-points small{display:block}
.launcher-points small{color:#c1d3ef;margin-top:3px}
.launcher-right{padding:42px;display:grid;align-content:center;gap:16px}
.choice{padding:22px;border:1px solid var(--line);border-radius:18px;background:#fff;display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center}
.choice:hover{border-color:#8fb3ed;box-shadow:var(--shadow)}
.choice h2{margin:0 0 5px;font-size:22px}
.choice p{margin:0;color:var(--muted);font-size:13px}
.choice .arrow{font-size:22px;color:var(--blue)}
.choice-note{padding:13px;border-radius:12px;background:#fff8df;border:1px solid #efd17c;color:#664b03;font-size:12px}

/* customer */
.customer-header{position:sticky;top:0;z-index:110;background:rgba(6,26,67,.97);backdrop-filter:blur(14px);box-shadow:0 8px 24px rgba(4,19,49,.18)}
.customer-nav{height:74px;display:flex;align-items:center;gap:28px}
.customer-links{display:flex;align-items:center;justify-content:center;gap:30px;flex:1}
.customer-links a{text-decoration:none;color:#d9e5f8;font-size:13px;font-weight:850;padding:28px 0 23px;border-bottom:3px solid transparent}
.customer-links a:hover,.customer-links a.active{color:#fff;border-color:var(--gold)}
.mobile-menu{display:none;background:transparent;border:1px solid rgba(255,255,255,.2);color:#fff;width:42px;height:40px;border-radius:9px}
.section-title{display:flex;gap:12px;align-items:flex-start;margin-bottom:18px}
.section-title h2{margin:0;font-size:29px}
.section-title p{margin:5px 0 0;color:var(--muted);font-size:14px}
.hero{padding:44px 0 36px;background:radial-gradient(circle at 12% 16%,#edf4ff 0 12%,transparent 36%),linear-gradient(#fff,#fbfdff)}
.hero-grid{display:grid;grid-template-columns:1.02fr .98fr;gap:24px;align-items:center}
.hero-copy h1{font-size:50px;line-height:1.08;margin:16px 0}
.hero-copy h1 span{color:var(--blue)}
.hero-copy h1 em{font-style:normal;color:var(--gold2)}
.hero-copy>p{font-size:16px;line-height:1.75;color:#4f607a;max-width:560px}
.hero-actions{display:flex;gap:12px;margin:24px 0}
.hero-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:28px}
.hero-stat{padding:18px;text-align:center}
.hero-stat strong{display:block;font-size:24px;margin-top:6px}
.hero-stat span{font-size:12px;color:var(--muted);font-weight:800}
.section{padding:42px 0}
.steps-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.step-card{padding:22px;text-align:center}
.step-card i{display:grid;place-items:center;width:52px;height:52px;border-radius:50%;background:#eaf2ff;color:var(--blue);font-style:normal;font-weight:1000;margin:0 auto 12px}
.step-card:nth-child(2) i{background:#fff4d7;color:#aa7000}.step-card:nth-child(4) i{background:#eaf8ef;color:#19844a}
.step-card h3{font-size:16px;margin:0 0 8px}.step-card p{font-size:13px;line-height:1.6;color:var(--muted);margin:0}
.inquiry-layout{display:grid;grid-template-columns:1.25fr .75fr;gap:18px}
.panel{padding:22px}
.upload-area{padding:16px;border:1.5px dashed #8db2ef;border-radius:12px;background:#f7faff;display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center}
.upload-area.drag{background:#eaf2ff;border-color:var(--blue)}
.upload-area strong{display:block;font-size:13px}
.upload-area p{margin:4px 0 0;font-size:11px;color:var(--muted)}
.info-note{padding:12px;border-radius:10px;background:#eef5ff;color:#244b85;font-size:12px;font-weight:700;margin-top:12px}
.success-box{padding:14px;border-radius:14px;background:#eaf8ef;border:1px solid #addcbd;color:#14683a}
.success-box strong{display:block;font-size:22px;margin:5px 0}
.tracking-result{margin-top:14px}
.tracking-card{padding:16px;border:1px solid #dbe5f1;border-radius:12px;background:#fbfdff}
.tracking-card h3{margin:0 0 8px;font-size:18px;color:#1250b5}
.progress-line{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:15px 0 12px}
.progress-line span{position:relative;text-align:center;padding-top:27px;font-size:10px;color:#77859a;font-weight:900}
.progress-line span:before{content:"";position:absolute;top:4px;left:50%;transform:translateX(-50%);width:18px;height:18px;border-radius:50%;background:#dce5f0;z-index:2}
.progress-line span:after{content:"";position:absolute;top:12px;right:50%;left:-50%;height:2px;background:#dce5f0}
.progress-line span:first-child:after{display:none}
.progress-line .done{color:#1652af}.progress-line .done:before,.progress-line .done:after{background:var(--blue)}
.tracking-details{display:grid;grid-template-columns:1fr 1.4fr;gap:8px;font-size:12px}
.tracking-details dt{font-weight:900;color:#54657c}.tracking-details dd{margin:0}
.queue-preview{display:grid;gap:10px}
.queue-line{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid #e7edf4}
.queue-line:last-child{border-bottom:0}
.queue-line .avatar{width:34px;height:34px;font-size:10px}
.queue-line strong,.queue-line small{display:block}
.queue-line small{color:var(--green);font-size:10px}
.banner{padding:16px 22px;display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;background:#eef5ff;border:1px solid #b7cff4}
.support-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.support-card{padding:22px}
.support-card h3{margin:10px 0 7px}.support-card p{font-size:13px;line-height:1.7;color:var(--muted);margin:0}
.customer-footer{background:#071d48;color:#fff;padding:30px 0}
.footer-grid{display:grid;grid-template-columns:1.05fr repeat(3,.85fr);gap:24px;align-items:center}
.footer-item b,.footer-item small{display:block}.footer-item small{color:#c3d2eb;margin-top:4px;font-size:11px}
.footer-highlight{padding:16px;border-radius:14px;background:linear-gradient(135deg,var(--gold),#ff9f00);color:#17233b}
.footer-highlight b,.footer-highlight small{display:block}

/* admin login */
.admin-login{min-height:100vh;display:grid;grid-template-columns:1.02fr .98fr;background:linear-gradient(135deg,#061a43 0 52%,#f5f8fd 52%)}
.login-info{padding:60px clamp(26px,7vw,95px);color:#fff;display:flex;flex-direction:column;justify-content:center}
.login-info h1{font-size:48px;line-height:1.06;margin:40px 0 16px}
.login-info h1 span{color:var(--gold)}
.login-info>p{color:#d2dff3;line-height:1.75;max-width:620px}
.login-points{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:24px}
.login-points article{padding:14px;border:1px solid rgba(255,255,255,.15);border-radius:14px;background:rgba(255,255,255,.05)}
.login-points b,.login-points small{display:block}.login-points small{color:#bed0eb;margin-top:3px}
.login-box-wrap{display:grid;place-items:center;padding:24px}
.login-box{width:min(460px,100%);padding:30px}
.login-box h2{margin:0 0 6px}.login-box>p{margin:0 0 20px;color:var(--muted)}
.password-wrap{position:relative}
.password-wrap button{position:absolute;right:6px;bottom:6px;border:0;background:#eef4ff;border-radius:8px;padding:7px 9px;color:#1750a6;font-size:11px;font-weight:900}
.login-hint{margin-top:16px;padding:13px;border-radius:12px;background:#fff8de;border:1px solid #efd27b;color:#654901;font-size:12px}

/* admin dashboard */
.admin-topbar{position:sticky;top:0;z-index:120;height:72px;background:linear-gradient(90deg,#061a43,#031331);color:#fff;display:flex;align-items:center;padding:0 18px;gap:18px;box-shadow:0 8px 24px rgba(4,19,49,.22)}
.admin-topbar .brand{min-width:240px}
.admin-title{flex:1}.admin-title b,.admin-title small{display:block}.admin-title small{color:#bdd0ea;font-size:11px}
.admin-user{display:flex;align-items:center;gap:10px}
.admin-user small{display:block;color:#bfd0e8}
.admin-layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 72px)}
.admin-sidebar{position:sticky;top:72px;height:calc(100vh - 72px);background:#071d48;padding:16px 12px;color:#fff}
.admin-sidebar nav{display:grid;gap:6px}
.admin-tab{padding:12px 13px;border-radius:10px;color:#d5e0f4;text-decoration:none;font-size:13px;font-weight:850;display:flex;gap:10px;align-items:center}
.admin-tab:hover,.admin-tab.active{background:#12356e;color:#fff;border-left:4px solid var(--gold)}
.side-label{font-size:10px;color:#8ea4c3;letter-spacing:1px;margin:16px 10px 7px}
.side-box{position:absolute;bottom:15px;left:12px;right:12px;padding:12px;border:1px solid rgba(255,255,255,.13);border-radius:12px;background:rgba(255,255,255,.04)}
.side-box b,.side-box small{display:block}.side-box small{color:#abc0dd}
.admin-main{padding:22px}
.admin-toolbar{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:16px}
.admin-toolbar h1{font-size:30px;margin:0}
.admin-toolbar p{margin:4px 0 0;color:var(--muted)}
.admin-tools{display:flex;gap:8px;flex-wrap:wrap}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px}
.kpi{padding:17px}.kpi span{font-size:11px;color:#5a6a83;font-weight:900}.kpi strong{display:block;font-size:30px;margin:6px 0}.kpi small{font-size:10px;color:var(--muted)}
.admin-view{display:none}
.admin-view.active{display:block}
.view-grid{display:grid;grid-template-columns:1.35fr .95fr;gap:16px}
.view-stack{display:grid;gap:16px}
.admin-panel{padding:20px}
.panel-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}
.panel-head h2{margin:0;font-size:22px}.panel-head p{margin:5px 0 0;color:var(--muted);font-size:13px}
.filters{display:flex;gap:8px;flex-wrap:wrap}
.stat-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.activity-list{display:grid;gap:8px}
.activity-item{padding:10px;border:1px solid #e1e8f2;border-radius:11px;background:#fbfdff}
.activity-item b,.activity-item small{display:block}.activity-item b{font-size:12px}.activity-item small{font-size:10px;color:var(--muted);margin-top:4px}
.workflow{display:grid;gap:10px}
.workflow article{display:grid;grid-template-columns:auto 1fr;gap:11px;padding:12px;border:1px solid #dfe7f2;border-radius:12px;background:#fbfdff}
.workflow span{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:var(--blue);color:#fff;font-weight:1000}
.workflow h4{margin:0;font-size:13px}.workflow p{margin:4px 0 0;font-size:11px;color:var(--muted)}
.ticket-focus{margin-top:12px;padding:14px;border:1px solid #cde0fb;border-radius:12px;background:#f7faff}
.ticket-focus h3{margin:0 0 5px}.ticket-focus p{font-size:12px;margin:5px 0}
.team-list{display:grid;gap:10px}
.team-card{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:12px;border:1px solid #e1e8f2;border-radius:12px}
.team-card h4{margin:0;font-size:13px}.team-card p{margin:5px 0 0;font-size:11px;color:var(--muted)}
.team-metrics{display:flex;gap:12px;flex-wrap:wrap;margin-top:6px}.team-metrics span{font-size:10px;color:var(--muted)}.team-metrics strong{display:block;font-size:13px;color:var(--ink)}
.user-layout{display:grid;grid-template-columns:.78fr 1.22fr;gap:16px}
.account-form{padding:18px;border:1px solid #dfe7f2;border-radius:14px;background:#fbfdff}
.account-form h3{margin:0 0 14px}
.account-note{padding:12px;border-radius:10px;background:#fff8de;border:1px solid #efd07a;color:#644902;font-size:11px}
.form-actions{display:flex;gap:8px;flex-wrap:wrap}
.role-pill{display:inline-flex;padding:5px 8px;border-radius:999px;background:#eaf2ff;color:#1656bc;font-size:10px;font-weight:1000}
.dialog{border:0;border-radius:18px;width:min(700px,calc(100% - 30px));padding:0;box-shadow:0 34px 90px rgba(4,21,54,.3)}
.dialog::backdrop{background:rgba(2,14,36,.56)}
.dialog-body{padding:22px}
.dialog-close{float:right;border:0;background:#eef3fb;width:36px;height:36px;border-radius:10px;font-size:18px}
.detail-grid{display:grid;grid-template-columns:150px 1fr;gap:10px;font-size:12px}
.detail-grid dt{font-weight:900;color:#55657c}.detail-grid dd{margin:0}
.empty{padding:16px;border-radius:12px;background:#fbfdff;border:1px dashed #dbe5f1;color:var(--muted);font-size:13px}



/* branding customization */
.brand-mark.has-logo{transform:none;border:0;background:#fff;overflow:hidden;padding:3px}
.brand-mark.has-logo span{display:none}
.brand-mark.has-logo img{display:block;width:100%;height:100%;object-fit:contain;border-radius:9px}
.brand-preview{display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center;padding:14px;border:1px solid #dce5f1;border-radius:13px;background:#fbfdff;margin-bottom:14px}
.brand-preview-logo{width:72px;height:72px;border-radius:16px;border:1px solid #d5e0ef;background:#fff;display:grid;place-items:center;overflow:hidden;color:var(--gold);font-weight:1000;font-size:25px}
.brand-preview-logo img{width:100%;height:100%;object-fit:contain;padding:4px}
.brand-preview h3,.brand-preview p{margin:0}
.brand-preview p{font-size:12px;color:var(--muted);margin-top:4px}
.logo-upload-box{padding:15px;border:1.5px dashed #8eb2ed;border-radius:12px;background:#f7faff}
.logo-upload-box small{display:block;color:var(--muted);margin-top:6px;line-height:1.5}

/* auto refresh and enhanced phone support */
.auto-refresh-pill{display:inline-flex;align-items:center;gap:8px;min-height:38px;padding:8px 11px;border-radius:999px;background:#eaf8ef;border:1px solid #b9dfc5;color:#176b3d;font-size:11px;font-weight:900;white-space:nowrap}
.auto-refresh-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px rgba(31,167,89,.12)}
.tracking-refresh{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:12px 0;padding:9px 10px;border-radius:10px;background:#eef5ff;border:1px solid #c5d8f6;color:#244c87;font-size:10px;font-weight:850}
.tracking-refresh span{display:flex;align-items:center;gap:7px}
.mobile-scroll-note{display:none;padding:8px 10px;margin-bottom:8px;border-radius:9px;background:#fff8de;border:1px solid #efd27b;color:#654901;font-size:10px;font-weight:800}
.table-wrap{-webkit-overflow-scrolling:touch;overscroll-behavior-inline:contain}
button,.btn,a,input,select,textarea{touch-action:manipulation}

/* responsive */
@media(max-width:1100px){
  .hero-grid,.inquiry-layout,.view-grid,.user-layout{grid-template-columns:1fr}
  .kpis{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:900px){
  .customer-links{position:absolute;top:74px;left:0;right:0;display:none;max-height:calc(100vh - 74px);overflow-y:auto;background:#071d48;padding:8px 18px 15px;box-shadow:0 15px 28px rgba(3,18,46,.2)}
  .customer-links.open{display:grid}.customer-links a{padding:12px 4px;border-bottom:0;min-height:44px;display:flex;align-items:center}
  .mobile-menu{display:block;margin-left:auto}.customer-nav>.btn{display:none}
  .steps-grid,.support-cards{grid-template-columns:1fr 1fr}

function load(){
 try{
  const raw=JSON.parse(localStorage.getItem(KEY));
  if(raw&&raw.version===5&&Array.isArray(raw.users)&&Array.isArray(raw.tickets))return raw;
 }catch(e){}
 const s=seed();save(s);return s;
}
function save(s){localStorage.setItem(KEY,JSON.stringify(s))}
function user(id){return state.users.find(u=>u.id===id)}
function techUsers(){return state.users.filter(u=>u.role==='tech'&&u.active)}

 return list.length

function clearAutoRefresh(){
 if(autoRefreshTimer)clearInterval(autoRefreshTimer);
 autoRefreshTimer=null;
 autoRefreshSeconds=15;
}
function isUserEditing(){
 const el=document.activeElement;
 return !!(el&&['INPUT','TEXTAREA','SELECT'].includes(el.tagName));
}
function setAdminRefreshLabel(text){
 const el=$('#adminAutoRefreshLabel');
 if(el)el.textContent=text;
}
function startAdminAutoRefresh(isAdmin){
 clearAutoRefresh();
 autoRefreshSeconds=15;
 setAdminRefreshLabel('Auto-refresh in 15s');
 autoRefreshTimer=setInterval(()=>{
   if(document.hidden)return;
   if(isUserEditing()||$('#ticketDialog')?.open){
     setAdminRefreshLabel('Paused while editing');
     return;
   }
   autoRefreshSeconds-=1;
   if(autoRefreshSeconds<=0){
     state=load();
     refreshSLA();
     state=load();
     const freshUser=user(currentUser?.id);
     if(!freshUser||!freshUser.active){
       clearAutoRefresh();
       sessionStorage.removeItem(SESSION);
       renderAdminLogin();
       return;
     }
     currentUser=freshUser;
     renderAdminData(isAdmin);
     autoRefreshSeconds=15;
   }
   setAdminRefreshLabel('Auto-refresh in '+autoRefreshSeconds+'s');
 },1000);
}
function startCustomerAutoRefresh(id,email){
 clearAutoRefresh();
 trackedTicketId=id;
 trackedTicketEmail=email.toLowerCase();
 autoRefreshSeconds=15;
 const update=()=>{
   const label=$('#customerAutoRefreshLabel');
   if(label)label.textContent='Auto-refresh in '+autoRefreshSeconds+'s';
 };
 update();
 autoRefreshTimer=setInterval(()=>{
   if(document.hidden)return;
   autoRefreshSeconds-=1;
   if(autoRefreshSeconds<=0){
     refreshTrackedTicket(false);
     autoRefreshSeconds=15;
   }
   update();
 },1000);
}
function refreshTrackedTicket(showNotice=true){
 if(!trackedTicketId||!trackedTicketEmail)return;
 state=load();
 refreshSLA();
 state=load();
 const t=state.tickets.find(x=>x.id===trackedTicketId&&x.email.toLowerCase()===trackedTicketEmail);
 if(!t)return;
 showTracking(t,false);
 autoRefreshSeconds=15;
 const label=$('#customerAutoRefreshLabel');
 if(label)label.textContent='Auto-refresh in 15s';
 if(showNotice)notify('Ticket status refreshed.','success');
}

function log(msg){state.activity.unshift({id:uid('act'),message:msg,at:Date.now()});state.activity=state.activity.slice(0,100)}
function nextTicketId(){const n=Math.max(0,...state.tickets.map(t=>Number(t.id.split('-').pop())||0))+1;return 'SMX-TS-2026-'+String(n).padStart(4,'0')}
function nextTech(exclude=[]){const list=techUsers().filter(t=>!exclude.includes(t.id));if(!list.length)return null;const tech=list[state.nextOfferIndex%list.length];state.nextOfferIndex=(state.nextOfferIndex+1)%Math.max(1,list.length);return tech}
function offerTicket(t,exclude=[]){const tech=nextTech(exclude);t.currentOffer=tech?{userId:tech.id,offeredAt:Date.now()}:null;t.lastUpdatedAt=Date.now();if(tech)log(t.id+' offered to '+tech.name+'.')}
function refreshSLA(){
 let changed=false;
 state.tickets.forEach(t=>{
  if(t.status==='Resolved'||t.assignedTo||!t.currentOffer)return;
  const mins=(Date.now()-t.currentOffer.offeredAt)/60000;
  if(mins>=Number(state.settings.slaMinutes||DEFAULT_SLA)){
   t.offerHistory.push({userId:t.currentOffer.userId,offeredAt:t.currentOffer.offeredAt,acceptedAt:null,missedAt:Date.now()});
   const missed=user(t.currentOffer.userId);
   t.currentOffer=null;t.lastUpdatedAt=Date.now();
   log(t.id+' acceptance offer missed'+(missed?' by '+missed.name:'')+'.');
   offerTicket(t,[missed?.id].filter(Boolean));changed=true;
  }
 });
 if(changed)save(state);
}
function currentOfferName(t){return user(t.currentOffer?.userId)?.name||'—'}
function selectedStep(t){return t.status==='Resolved'?4:t.firstReplyAt?3:t.assignedTo?2:1}
function acceptedCount(id){return state.tickets.filter(t=>t.assignedTo===id).length}
function missedCount(id){return state.tickets.reduce((n,t)=>n+t.offerHistory.filter(o=>o.userId===id&&o.missedAt).length,0)}
function noReplyCount(id){return state.tickets.filter(t=>t.assignedTo===id&&!t.firstReplyAt&&t.status!=='Resolved').length}
function resolvedCount(id){return state.tickets.filter(t=>t.assignedTo===id&&t.status==='Resolved').length}

function wireCustomer(){
 $('#mobileMenu').onclick=()=>$('#customerLinks').classList.toggle('open');
 $$('[data-scroll]').forEach(b=>b.onclick=()=>$(b.dataset.scroll)?.scrollIntoView({behavior:'smooth'}));
 $$('.customer-links a').forEach(a=>a.onclick=()=>$('#customerLinks').classList.remove('open'));
 $('#pageChatBtn').onclick=openPageChat;
 $('#pageChatBtnHero').onclick=openPageChat;
 $('#cDescription').oninput=e=>$('#descCounter').textContent=e.target.value.length+' / 1000';
 const area=$('#uploadArea'), input=$('#imageInput');
 $('#chooseFiles').onclick=e=>{e.stopPropagation();input.click()};
 area.onclick=()=>input.click();
 area.onkeydown=e=>{if(e.key==='Enter'||e.key===' ')input.click()};
 ['dragenter','dragover'].forEach(ev=>area.addEventListener(ev,e=>{e.preventDefault();area.classList.add('drag')}));
 ['dragleave','drop'].forEach(ev=>area.addEventListener(ev,e=>{e.preventDefault();area.classList.remove('drag')}));
 area.addEventListener('drop',e=>setFiles([...e.dataTransfer.files]));
 input.onchange=()=>setFiles([...input.files]);

 function setFiles(files){
   const allowed=['image/jpeg','image/png','image/webp'];
   const errors=[];
   if(files.length>3)errors.push('Maximum of 3 images only.');
   selectedFiles=files.slice(0,3).filter(f=>{
     if(!allowed.includes(f.type)){errors.push(f.name+': invalid file type');return false}
     if(f.size>2*1024*1024){errors.push(f.name+': exceeds 2 MB');return false}
     return true;
   });
   $('#fileChips').innerHTML=selectedFiles.map(f=>`<span class="file-chip">${esc(f.name)}</span>`).join('');
   if(errors.length)notify(errors.join(' · '),'error');
 }
 $('#customerForm').onsubmit=e=>{
   e.preventDefault();
   if(!e.currentTarget.reportValidity())return;
   refreshSLA();
   const tech=nextTech();
   const id=nextTicketId();
   const t={
    id,name:$('#cName').value.trim(),email:$('#cEmail').value.trim(),phone:$('#cPhone').value.trim(),
    category:$('#cCategory').value,serial:$('#cSerial').value.trim(),description:$('#cDescription').value.trim(),
    images:selectedFiles.map(f=>f.name),createdAt:Date.now(),lastUpdatedAt:Date.now(),status:'New',
    assignedTo:null,assignedName:null,acceptedAt:null,chatAssignedAt:null,firstReplyAt:null,resolvedAt:null,
    currentOffer:tech?{userId:tech.id,offeredAt:Date.now()}:null,offerHistory:[]
   };
   state.tickets.unshift(t);
   log(id+' submitted by '+t.name+'.'+(tech?' Offered to '+tech.name+'.':''));
   save(state);
   $('#submitResult').innerHTML=`<div class="success-box"><span>Your tracking number</span><strong>${id}</strong><p style="margin:0 0 10px">Save this number and send it in the Technical Support Page chat.</p><button type="button" class="btn btn-success btn-sm" id="trackCreated">Track This Ticket</button></div>`;
   $('#trackId').value=id;$('#trackEmail').value=t.email;
   $('#trackCreated').onclick=()=>{showTracking(t,true);$('#track').scrollIntoView({behavior:'smooth'})};
   e.currentTarget.reset();selectedFiles=[];$('#fileChips').innerHTML='';$('#descCounter').textContent='0 / 1000';
   notify('Inquiry submitted: '+id,'success');
 }
 $('#trackingForm').onsubmit=e=>{
   e.preventDefault();
   refreshSLA(); state=load();
   const id=$('#trackId').value.trim().toUpperCase(), email=$('#trackEmail').value.trim().toLowerCase();
   const t=state.tickets.find(x=>x.id===id && x.email.toLowerCase()===email);
   if(!t){clearAutoRefresh();trackedTicketId='';trackedTicketEmail='';$('#trackingResult').innerHTML='<div class="empty">No ticket found. Check the tracking number and email address.</div>';return}
   showTracking(t,true);
 }
}
function showTracking(t,startTimer=true){
 state=load();
 const fresh=state.tickets.find(x=>x.id===t.id)||t;
 const staff=user(fresh.assignedTo), step=selectedStep(fresh);
 $('#trackingResult').innerHTML=`<div class="tracking-card">
   <h3>${esc(fresh.id)}</h3>
   <span class="status ${slug(fresh.status)}">${esc(fresh.status)}</span>
   <div class="tracking-refresh">
    <span><i class="auto-refresh-dot"></i><b id="customerAutoRefreshLabel">Auto-refresh in ${autoRefreshSeconds}s</b></span>
    <button type="button" class="btn btn-light btn-sm" id="trackingManualRefresh">Refresh Now</button>
   </div>
   <div class="progress-line">
    <span class="done">Submitted</span>
    <span class="${step>=2?'done':''}">Accepted</span>
    <span class="${step>=3?'done':''}">In Progress</span>
    <span class="${step>=4?'done':''}">Resolved</span>
   </div>
   <dl class="tracking-details">
    <dt>Customer</dt><dd>${esc(fresh.name)}</dd>
    <dt>Product</dt><dd>${esc(fresh.category)}</dd>
    <dt>Model / Serial</dt><dd>${esc(fresh.serial)}</dd>
    <dt>Assigned Support</dt><dd>${staff?esc(staff.name):'Waiting for support acceptance'}</dd>
    <dt>Business Suite</dt><dd>${fresh.chatAssignedAt?'Assigned in Page chat':'Pending manual assignment'}</dd>
    <dt>Last Updated</dt><dd>${fmt(fresh.lastUpdatedAt)}</dd>
   </dl>
   <button class="btn btn-primary btn-full" id="trackingChatBtn" style="margin-top:12px">Message Technical Support Page</button>
 </div>`;
 $('#trackingChatBtn').onclick=openPageChat;
 $('#trackingManualRefresh').onclick=()=>refreshTrackedTicket(true);
 if(startTimer)startCustomerAutoRefresh(fresh.id,fresh.email);
}

function handleTicketWorkflow(e,isAdmin){

 if(btn.dataset.flow==='chat'){t.chatAssignedAt=Date.now(); t.lastUpdatedAt=Date.now(); log(t.id+' Page conversation confirmed in Business Suite.');}
 if(btn.dataset.flow==='reply'){t.firstReplyAt=Date.now(); t.lastUpdatedAt=Date.now(); t.status='In Progress'; log('First reply recorded for '+t.id+'.');}
 if(btn.dataset.flow==='waiting'){t.status='Waiting Customer'; t.lastUpdatedAt=Date.now(); log(t.id+' is waiting for customer response.');}
 if(btn.dataset.flow==='resolve'){t.status='Resolved'; t.resolvedAt=Date.now(); t.lastUpdatedAt=Date.now(); log(t.id+' resolved by '+currentUser.name+'.');}
 save(state); renderAdminData(isAdmin); notify('Ticket updated.','success');

function saveUser(e){
 e.preventDefault();
 const name=$('#uName').value.trim(), username=$('#uUsername').value.trim().toLowerCase(), password=$('#uPassword').value;
 $('#accountError').textContent='';
 if(!name || username.length<3 || password.length<6){$('#accountError').textContent='Complete all fields. Username must be at least 3 characters and password at least 6 characters.'; return;}
 const duplicate=state.users.find(u=>u.username.toLowerCase()===username && u.id!==editUserId);
 if(duplicate){$('#accountError').textContent='That username is already in use.'; return;}
 if(editUserId){
   const u=user(editUserId); if(!u) return;
   const old=u.name;
   u.name=name; u.username=username; u.password=password; u.active=true;
   state.tickets.forEach(t=>{if(t.assignedTo===u.id)t.assignedName=name; if(t.currentOffer?.userId===u.id){}});
   log('Technical support account updated: '+old+' → '+name+'.');
   notify('Account updated.','success');
 }else{
   const u={id:uid('tech'),role:'tech',name,username,password,active:true,createdAt:Date.now()};
   state.users.push(u);
   log('Technical support account added: '+name+' (@'+username+').');

 }

 }
 if(btn.dataset.user==='delete'){
   const activeTickets=state.tickets.filter(t=>t.assignedTo===u.id && t.status!=='Resolved');
   if(!confirm(`Delete ${u.name}'s account? ${activeTickets.length} active ticket(s) will return to the unassigned queue.`)) return;
   activeTickets.forEach(t=>{
     t.assignedTo=null; t.assignedName=null; t.acceptedAt=null; t.chatAssignedAt=null; t.firstReplyAt=null; t.status='New'; t.lastUpdatedAt=Date.now();
     offerTicket(t,[u.id]);
   });
   state.tickets.forEach(t=>{if(t.currentOffer?.userId===u.id){t.currentOffer=null; offerTicket(t,[u.id]);}});
   state.users=state.users.filter(x=>x.id!==u.id);

   if(editUserId===u.id) resetUserForm();

function handleCategoryActions(e){
 const btn=e.target.closest('button');
 if(!btn)return;
 const tr=btn.closest('tr');
 const list=productCategories();
 const index=list.findIndex(c=>c.id===tr.dataset.id);
 if(index<0)return;
 const category=list[index];
 const action=btn.dataset.category;
 if(action==='edit'){
   editCategoryId=category.id;
   $('#categoryName').value=category.name;
   $('#categoryFormTitle').textContent='Edit Product Category';
   $('#saveCategoryBtn').textContent='Save Changes';
   $('#cancelCategoryEdit').hidden=false;
   showAdminTab('categories');
   window.scrollTo({top:0,behavior:'smooth'});
   return;
 }
 if(action==='up'&&index>0){
   [list[index-1],list[index]]=[list[index],list[index-1]];
   log('Product category order updated.');
   save(state);renderCategories();return;
 }
 if(action==='down'&&index<list.length-1){
   [list[index+1],list[index]]=[list[index],list[index+1]];
   log('Product category order updated.');
   save(state);renderCategories();return;
 }
 if(action==='delete'){
   if(list.length===1){
     notify('At least one product category is required for the customer form. Edit this category instead.','error');
     return;
   }
   const used=state.tickets.filter(t=>t.category===category.name).length;
   const note=used?` It is used by ${used} existing ticket(s), but those tickets will keep the saved category name.`:'';
   if(!confirm(`Delete "${category.name}" from the customer form?${note}`))return;
   state.settings.productCategories=list.filter(c=>c.id!==category.id);
   log('Product category deleted: '+category.name+'.');
   if(editCategoryId===category.id)resetCategoryForm();
   save(state);renderCategories();
   notify('Product category removed from the customer form.','success');
 }
}

function handleLogoSelection(e){
 const file=e.target.files?.[0];
 if(!file)return;
 const allowed=['image/jpeg','image/png','image/webp'];
 if(!allowed.includes(file.type)){
   e.target.value='';
   notify('Logo must be JPG, PNG, or WEBP.','error');
   return;
 }
 if(file.size>1024*1024){
   e.target.value='';
   notify('Logo file must not exceed 1 MB.','error');
   return;
 }
 const reader=new FileReader();
 reader.onload=()=>{
   state.settings.logoDataUrl=String(reader.result||'');
   settingsDirty=true;
   const preview=$('#brandPreviewLogo');
   if(preview)preview.innerHTML=`<img src="${state.settings.logoDataUrl}" alt="Logo preview">`;
   notify('Logo selected. Click Save All Settings to apply it.','success');
 };
 reader.onerror=()=>notify('Unable to read the selected logo.','error');
 reader.readAsDataURL(file);
}

function saveSettings(){
 const websiteName=$('#websiteName').value.trim();
 const websiteSubtitle=$('#websiteSubtitle').value.trim();
 const url=$('#pageUrl').value.trim();
 const sla=Number($('#slaMinutes').value);
 if(!websiteName){notify('Website / Page Name is required.','error');return;}
 if(!websiteSubtitle){notify('Website Subtitle is required.','error');return;}
 if(url && !/^https?:\/\//i.test(url)){notify('Page URL must start with http:// or https://','error'); return;}
 if(!Number.isFinite(sla) || sla<5 || sla>1440){notify('SLA must be between 5 and 1440 minutes.','error'); return;}
 state.settings.websiteName=websiteName;
 state.settings.websiteSubtitle=websiteSubtitle;
 state.settings.pageName=(websiteName+' '+websiteSubtitle).trim();
 state.settings.pageUrl=url;
 state.settings.slaMinutes=sla;
 settingsDirty=false;

 notify('Logo, website name, and settings saved.','success');

function exportCSV(){

 const csv=rows.map(r=>r.map(v=>'"'+String(v).replaceAll('"','""')+'"').join(',')).join('\n');
 const a=document.createElement('a');
 a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));

 setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}

   <dt>Product Category</dt><dd>${esc(t.category)}</dd>
   <dt>Model / Serial</dt><dd>${esc(t.serial)}</dd>
   <dt>Description</dt><dd>${esc(t.description)}</dd>
   <dt>Assigned Support</dt><dd>${esc(user(t.assignedTo)?.name || t.assignedName || 'Unassigned')}</dd>
   <dt>Current Offer</dt><dd>${t.currentOffer?esc(currentOfferName(t)):'—'}</dd>
   <dt>Uploaded Images</dt><dd>${t.images.length?t.images.map(esc).join(', '):'No images'}</dd>
   <dt>Created</dt><dd>${fmt(t.createdAt)}</dd>
   <dt>Accepted</dt><dd>${fmt(t.acceptedAt)}</dd>
   <dt>Business Suite</dt><dd>${fmt(t.chatAssignedAt)}</dd>
   <dt>First Reply</dt><dd>${fmt(t.firstReplyAt)}</dd>
   <dt>Resolved</dt><dd>${fmt(t.resolvedAt)}</dd>
 </dl>`;
 $('#ticketDialog').showModal();
}
$('#dialogClose').onclick=()=>$('#ticketDialog').close();
$('#ticketDialog').addEventListener('click',e=>{if(e.target===$('#ticketDialog'))$('#ticketDialog').close()});

state=load();
window.addEventListener('storage',e=>{
 if(e.key!==KEY)return;
 state=load();
 if($('#adminTabs')&&currentUser&&!isUserEditing()&&!$('#ticketDialog')?.open){
   const fresh=user(currentUser.id);
   if(fresh&&fresh.active){
     currentUser=fresh;
     renderAdminData(currentUser.role==='admin');
     autoRefreshSeconds=15;
     setAdminRefreshLabel('Updated from another device/tab');
   }
 }
 if(trackedTicketId&&trackedTicketEmail&&!isUserEditing()){
   refreshTrackedTicket(false);
 }
 applyBranding();
});

const portal=new URLSearchParams(location.search).get('portal');
if(portal==='customer'){renderCustomer();}
else if(portal==='admin'){
  const sid=sessionStorage.getItem(SESSION);
  if(sid){currentUser=user(sid);}
  renderAdmin();
}else{renderLauncher();}
})();
</script>
</body>
</html>
