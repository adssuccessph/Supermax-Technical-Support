ked using the product, quantity, SO number, and release date.</div><div class="warn" style="margin-top:10px">Products not purchased from Supermax or outside warranty may have a possible service charge after technical assessment.</div></aside></div></section><section class="section" id="process"><div class="shell"><div class="section-title"><span class="icon">➜</span><div><h2>Support Workflow</h2><p>One inquiry moves through five clear stages.</p></div></div><div class="steps"><article class="step card"><i>1</i><h3>Submit</h3><p>Customer, sales, product groups, serials, and concern.</p></article><article class="step card"><i>2</i><h3>Trace</h3><p>Serial or non-serial purchase verification.</p></article><article class="step card"><i>3</i><h3>Warranty</h3><p>SO and release date determine coverage.</p></article><article class="step card"><i>4</i><h3>Classify</h3><p>Warranty, possible charge, mixed, or assessment.</p></article><article class="step card"><i>5</i><h3>Resolve</h3><p>Technical Support accepts and resolves.</p></article></div></div></section><section class="section" id="submit"><div class="shell"><div class="section-title"><span class="icon">✎</span><div><h2>Submit a New Inquiry</h2><p>Add one or more product groups.</p></div></div><div class="customer-layout"><section class="card panel"><form id="customerForm"><div class="row"><label>Customer / Company Name *<input id="cName" required></label><label>Email Address *<input id="cEmail" type="email" required></label><label>Contact Number<input id="cPhone"></label><label>Sales Representative / Pinagbilhan *<select id="cSales" required>${salesOptions()}</select></label></div><div class="info" style="margin-top:11px">The Sales Representative list is managed by Main Admin.</div><div class="groups" id="groups" style="margin-top:13px"></div><button class="btn btn-light" type="button" id="addGroup" style="margin-top:9px">＋ Add Another Product Category</button><label style="margin-top:13px">Concern Description *<textare function addGroup(){groupNo++;const id=uid('draft'),w=document.createElement('article');w.className='product-group';w.dataset.id=id;w.innerHTML=`<div class="group-head"><h3>Product Group ${groupNo}</h3><button class="btn btn-danger btn-sm remove" type="button">Remove</button></div><div class="row"><label>Product Category *<select class="gcat" required>${catOptions()}</select></label><label>Product Model / Name *<input class="gmodel" required></label></div><div class="gfields" style="margin-top:10px"><div class="empty">Select a category.</div></div>`;$('#groups').appendChild(w);$('.gcat',w).onchange=()=>renderGroup(w);$('.remove',w).onclick=()=>{$$('.product-group').length===1?notify('At least one product group is required.','error'):(w.remove(),renumber())}}function renumber(){$$('.product-group').forEach((g,i)=>$('h3',g).textContent='Product Group '+(i+1))}function renderGroup(w){const c=cat($('.gcat',w).value),b=$('.gfields',w);if(!c){b.innerHTML='<div class="empty">Select a category.</div>';return}const note=c.trackingType==='serialized'?'Serials required. Quantity follows serial count.':c.trackingType==='nonserialized'?'No serial required. Enter quantity.':'Serials optional; quantity can be used.';b.innerHTML=`<div class="group-note"><b>${esc(c.trackingType)}</b> — ${esc(note)}</div><div class="row" style="margin-top:9px"><label>Quantity *<input class="gqty" type="number" min="1" value="1" required ${c.trackingType==='serialized'?'readonly':''}></label><label>Warranty Rule<input disabled value="${c.warrantyMonths} month(s) · ${c.requireSO?'SO required':'SO optional'}"></label></div>${c.trackingType!=='nonserialized'?`<label style="margin-top:9px">Serial Numbers ${c.trackingType==='serialized'?'*':'(Optional)'}<textarea class="gserials" ${c.trackingType==='serialized'?'required':''} placeholder="One serial per line"></textarea><div class="serial-help"><span>Duplicates and blank lines are removed.</span><b class="gcount">0 serial(s)</b></div></label>`:''}`;const s=$('.gserials',w);if(s){s.oninput=()=>{const a=parseSerials(s.value);$('.gcount',w).textContent=a.length+' serial(s)';if(c.trackingType==='serialized')$('.gqty',w).value=Math.max(1,a.length)}}}function parseSerials(v){return[...new Set(String(v||'').split(/\r?\n|,/).map(x=>x.trim()).filter(Boolean))]}function collectGroups(){const out=[],seen=new Set();for(const w of $$('.product-group')){const c=cat($('.gcat',w).value);if(!c)throw Error('Select a category for every product group.');const model=$('.gmodel',w).value.trim();if(!model)throw Error('Enter a model or product name.');const serials=$('.gserials',w)?parseSerials($('.gserials',w).value):[];if(c.trackingType==='serialized'&&!serials.length)throw Error(c.name+' requires serial numbers.');serials.forEach(s=>{if(seen.has(s.toLowerCase()))throw Error('Duplicate serial: '+s);seen.add(s.toLowerCase())});const qty=c.trackingType==='serialized'?serials.length:Number($('.gqty',w).value||1);const g={id:uid('g'),categoryId:c.id,categoryName:c.name,trackingType:c.trackingType,warrantyMonths:Number(c.warrantyMonths||0),requireSO:!!c.requireSO,requireReleaseDate:!!c.requireReleaseDate,model,quantity:qty,serials:serials.map(value=>({id:uid('p'),value,purchaseResult:'pending',soNumber:'',releaseDate:'',warrantyStatus:'Pending',warrantyExpiry:'',serviceClass:'For Review',chargeAmount:'',notes:'',verifiedBy:'',verifiedAt:null})),verification:null};if(c.trackingType==='nonserialized'||(c.trackingType==='optional'&&!serials.length))g.verification={id:uid('v'),purchaseResult:'pending',soNumber:'',releaseDate:'',warrantyStatus:'Pending',warrantyExpiry:'',serviceClass:'For Review',chargeAmount:'',notes:'',verifiedBy:'',verifiedAt:null};out.push(g)}return out}
function wireCustomer(){$('#mobileMenu').onclick=()=>$('#customerLinks').classList.toggle('open');$$('[data-scroll]').forEach(b=>b.onclick=()=>$(b.dataset.scroll)?.scrollIntoView({behavior:'smooth'}));$('#messagePage').onclick=openChat;$('#floatingChat').onclick=openChat;$('#addGroup').onclick=addGroup;addGroup();$('#cDesc').oninput=e=>$('#descCount').textContent=e.target.value.length+' / 1500';const inp=$('#imageInput');$('#chooseFiles').onclick=e=>{e.stopPropagation();inp.click()};$('#upload').onclick=()=>inp.click();inp.onchange=()=>{const a=[...inp.files],err=[];if(a.length>3)err.push('Maximum 3 images.');files=a.slice(0,3).filter(f=>{if(!['image/jpeg','image/png','image/webp'].includes(f.type)){err.push(f.name+' invalid');return false}if(f.size>2*1024*1024){err.push(f.name+' exceeds 2 MB');return false}return true});$('#chips').innerHTML=files.map(f=>`<span class="chip">${esc(f.name)}</span>`).join('');if(err.length)notify(err.join(' · '),'error')};$('#customerForm').onsubmit=e=>{e.preventDefault();try{const groups=collectGroups(),s=sales().find(x=>x.id===$('#cSales').value);if(!s)throw Error('Select the sales representative.');const id=ticketId(),t={id,name:$('#cName').value.trim(),email:$('#cEmail').value.trim(),phone:$('#cPhone').value.trim(),salesRepId:s.id,salesRepName:s.name,description:$('#cDesc').value.trim(),images:files.map(f=>f.name),groups,createdAt:Date.now(),lastUpdatedAt:Date.now(),verificationStatus:'Pending',verificationAssignedTo:null,verificationOffer:null,verificationHistory:[],technicalStatus:'Waiting Verification',techAssignedTo:null,techAssignedName:null,techOffer:null,techHistory:[],chatAssignedAt:null,firstReplyAt:null,resolvedAt:null,overallServiceClass:'For Review'};offerTrace(t);state.tickets.unshift(t);log(id+' submitted with '+groups.length+' product group(s).');save(state);$('#submitResult').innerHTML=`<div class="success">Inquiry submitted.<strong style="display:block;font-size:21px;margin:5px 0">${id}</strong><button class="btn btn-success btn-sm" type="button" id="trackCreated">Track This Inquiry</button></div>`;$('#trackId').value=id;$('#trackEmail').value=t.email;$('#trackCreated').onclick=()=>{showTracking(t,true);$('#track').scrollIntoView({behavior:'smooth'})};e.currentTarget.reset();$('#groups').innerHTML='';groupNo=0;addGroup();files=[];$('#chips').innerHTML='';notify('Inquiry submitted.','success')}catch(err){notify(err.message,'error')}};$('#trackForm').onsubmit=e=>{e.preventDefault();state=load();const t=state.tickets.find(x=>x.id===$('#trackId').value.trim().toUpperCase()&&x.email.toLowerCase()===$('#trackEmail').value.trim().toLowerCase());if(!t){$('#trackResult').innerHTML='<div class="empty">No matching ticket.</div>';return}showTracking(t,true)}}

function showTracking(t,start){
 state=load();t=state.tickets.find(x=>x.id===t.id)||t;ensureTicket(t);
 const resolved=isResolvedStatus(t.technicalStatus);
 const step=resolved?5:(t.resolutionRequestedAt||t.firstReplyAt)?4:t.techAssignedTo?3:t.verificationStatus==='Complete'?2:1;
 const review=reviewForTicket(t);
 const reassigned=(t.turnoverHistory||[]).some(h=>['Accepted','Forced Reassignment','Returned'].includes(h.status));
 let quotationBox='';
 if(['Possible Charge','Mixed'].includes(t.overallServiceClass)&&['Not Required','For Technical Assessment'].includes(t.chargeStatus)){
  quotationBox=`<div class="charge-box"><h4>Possible Service Charge</h4><p>This item may have a service fee if you ask Supermax to repair or service it. Technical Support will show the final amount only after assessment.</p><span class="quotation-status">For Technical Assessment</span></div>`
 }else if(t.chargeStatus==='For Quotation'){
  quotationBox=`<div class="charge-box"><h4>Service Quotation</h4><p>Technical Support prepared the following service quotation after assessment.</p><div class="charge-amount">₱${Number(t.quotationAmount||0).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2})}</div><p>${esc(t.quotationNotes||'Service quotation prepared after technical assessment.')}</p><span class="quotation-status">Waiting for Customer Approval</span><div class="actions" style="margin-top:10px"><button class="btn btn-success" id="approveQuotation">Approve Quotation</button><button class="btn btn-danger" id="declineQuotation">Decline Quotation</button></div></div>`
 }else if(t.chargeStatus==='Quotation Approved'){
  quotationBox=`<div class="charge-box"><h4>Quotation Approved</h4><div class="charge-amount">₱${Number(t.quotationAmount||0).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2})}</div><p>${esc(t.quotationNotes||'Approved service quotation.')}</p><span class="status status-quotation-approved">Approved by Customer</span></div>`
 }else if(t.chargeStatus==='Quotation Declined'){
  quotationBox=`<div class="charge-box"><h4>Quotation Declined</h4><div class="charge-amount">₱${Number(t.quotationAmount||0).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2})}</div><p>The customer declined this service quotation.</p><span class="status status-quotation-declined">Declined by Customer</span></div>`
 }
 let customerAction='';
 if(t.technicalStatus==='Waiting for Customer Resolution'){
  customerAction=`<div class="resolution-box"><h4>Technical work has been completed.</h4><p>Please confirm whether your concern is already resolved. Technical Support cannot close this ticket without your confirmation.</p><div class="actions"><button class="btn btn-success" id="customerResolved">Yes, My Concern Is Resolved</button><button class="btn btn-danger" id="customerNeedsHelp">No, I Still Need Help</button></div></div>`
 }else if(t.technicalStatus==='Resolved by Customer'){
  if(review){
   customerAction=`<div class="review-status">Your review status: <b>${esc(review.status)}</b>${review.status==='Approved'?' — It is now visible in the customer review section.':''}</div>`
  }else{
   customerAction=`<form class="review-form" id="customerReviewForm"><h4>Share a Customer Review</h4><div class="row"><label>Rating *<select id="reviewRating" required><option value="">Select rating</option><option value="5">★★★★★ — Excellent</option><option value="4">★★★★☆ — Very Good</option><option value="3">★★★☆☆ — Good</option><option value="2">★★☆☆☆ — Fair</option><option value="1">★☆☆☆☆ — Poor</option></select></label><label>Display Name *<input id="reviewName" required value="${esc(t.name)}"></label><label>Company Name (Optional)<input id="reviewCompany" placeholder="Company or business name"></label><label>Review Image (Optional)<input id="reviewImage" type="file" accept="image/jpeg,image/png,image/webp"></label></div><label style="margin-top:9px">Review *<textarea id="reviewText" required maxlength="800" placeholder="Tell us about your technical support experience."></textarea></label><label style="margin-top:9px;display:flex;grid-template-columns:auto 1fr;align-items:start"><input id="reviewPermission" type="checkbox" required style="width:auto;margin-top:3px"><span>I allow this review to be displayed publicly after Main Admin approval.</span></label><button class="btn btn-primary" style="margin-top:10px">Submit Review for Approval</button></form>`
  }
 }else if(t.technicalStatus==='Force Closed'){
  customerAction=`<div class="review-status">This inquiry was closed by the Main Admin. Reason: <b>${esc(t.forceCloseReason||'Administrative closure')}</b></div>`
 }else if(t.technicalStatus==='Reopened by Customer'){
  customerAction=`<div class="warn" style="margin-top:10px"><b>Inquiry reopened.</b><br>Your concern was returned to the assigned Technical Support. Reason: ${esc(t.customerReopenReason||'Customer still needs assistance.')}</div>`
 }
 $('#trackResult').innerHTML=`<div class="track-card"><h3>${t.id}</h3><span class="status ${slug(displayStatus(t))}">${esc(displayStatus(t))}</span><div class="track-refresh"><span><i class="dot"></i> <b id="trackAuto">Auto-refresh in ${autoSeconds}s</b></span><button class="btn btn-light btn-sm" id="refreshTrack">Refresh Now</button></div><div class="progress"><span class="done">Submitted</span><span class="${step>=2?'done':''}">Verified</span><span class="${step>=3?'done':''}">Accepted</span><span class="${step>=4?'done':''}">Customer Confirmation</span><span class="${step>=5?'done':''}">Resolved</span></div><dl class="details"><dt>Customer</dt><dd>${esc(t.name)}</dd><dt>Sales Representative</dt><dd>${esc(t.salesRepName)}</dd><dt>Verification</dt><dd>${esc(t.verificationStatus)}</dd><dt>Service Classification</dt><dd><span class="status ${slug(t.overallServiceClass)}">${esc(t.overallServiceClass)}</span></dd><dt>Charge / Quotation Status</dt><dd>${esc(t.chargeStatus||'Not Required')}</dd><dt>Serial Tracer</dt><dd>${esc(user(t.verificationAssignedTo)?.name||'Waiting')}</dd><dt>Technical Support</dt><dd>${esc(user(t.techAssignedTo)?.name||t.techAssignedName||'Waiting')}</dd><dt>Resolution Status</dt><dd>${esc(t.technicalStatus)}</dd></dl>${reassigned?'<div class="info" style="margin-top:10px">Your inquiry was reassigned to another support specialist so assistance can continue without interruption.</div>':''}<div class="track-products">${t.groups.map(g=>{const its=g.serials.length?g.serials:[g.verification],c=[...new Set(its.map(i=>i.serviceClass))].join(', ');return`<div class="track-product"><b>${esc(g.categoryName)} — ${esc(g.model)}</b><small>${g.serials.length?g.serials.length+' serial(s)':g.quantity+' unit(s)'} · ${esc(c)}</small></div>`}).join('')}</div>${quotationBox}${customerAction}<button class="btn btn-primary btn-full" id="trackChat" style="margin-top:10px">Message Support Page</button></div>`;
 $('#trackChat').onclick=openChat;$('#refreshTrack').onclick=()=>refreshTrack(true);
 $('#approveQuotation')?.addEventListener('click',()=>customerQuotationResponse(t.id,'Approved'));
 $('#declineQuotation')?.addEventListener('click',()=>customerQuotationResponse(t.id,'Declined'));
 $('#customerResolved')?.addEventListener('click',()=>customerConfirmResolved(t.id));
 $('#customerNeedsHelp')?.addEventListener('click',()=>customerStillNeedsHelp(t.id));
 $('#customerReviewForm')?.addEventListener('submit',e=>submitCustomerReview(e,t.id));
 if(start)startTrack(t.id,t.email)
}

function customerQuotationResponse(ticketId,response){
 const action=response==='Approved'?'approve':'decline';
 if(!confirm(`Confirm that you want to ${action} this service quotation?`))return;
 state=load();const t=state.tickets.find(x=>x.id===ticketId);
 if(!t||t.chargeStatus!=='For Quotation'){notify('This quotation is no longer waiting for approval.','error');return}
 t.quotationResponse=response;t.quotationRespondedAt=Date.now();t.chargeStatus=response==='Approved'?'Quotation Approved':'Quotation Declined';t.lastUpdatedAt=Date.now();
 log(t.id+' quotation '+response.toLowerCase()+' by the customer.');save(state);showTracking(t,false);notify('Quotation '+response.toLowerCase()+'.','success')
}
function customerConfirmResolved(ticketId){
 if(!confirm('Confirm that your concern is fully resolved?'))return;
 state=load();const t=state.tickets.find(x=>x.id===ticketId);if(!t||t.technicalStatus!=='Waiting for Customer Resolution'){notify('This ticket is no longer waiting for confirmation.','error');return}
 t.technicalStatus='Resolved by Customer';t.resolvedByCustomer=true;t.resolvedAt=Date.now();t.lastUpdatedAt=Date.now();
 t.resolutionHistory.unshift({action:'Resolved by Customer',at:t.resolvedAt,email:trackedEmail});
 log(t.id+' marked resolved by the customer.');save(state);showTracking(t,false);notify('Thank you. The inquiry is now resolved.','success')
}
function customerStillNeedsHelp(ticketId){
 const reason=prompt('Please briefly explain why you still need help:');if(reason===null)return;if(!reason.trim()){notify('Please enter a reason before reopening the inquiry.','error');return}
 state=load();const t=state.tickets.find(x=>x.id===ticketId);if(!t||t.technicalStatus!=='Waiting for Customer Resolution'){notify('This ticket is no longer waiting for confirmation.','error');return}
 t.technicalStatus='Reopened by Customer';t.customerReopenReason=reason.trim();t.customerReopenedAt=Date.now();t.lastUpdatedAt=Date.now();
 t.resolutionHistory.unshift({action:'Reopened by Customer',reason:reason.trim(),at:t.customerReopenedAt,email:trackedEmail});
 log(t.id+' reopened by the customer.');save(state);showTracking(t,false);notify('Your inquiry was reopened and returned to Technical Support.','success')
}
function readReviewImage(file){
 return new Promise((resolve,reject)=>{if(!file){resolve('');return}if(!['image/jpeg','image/png','image/webp'].includes(file.type)){reject(new Error('Review image must be JPG, PNG, or WEBP.'));return}if(file.size>1024*1024){reject(new Error('Review image must be 1 MB or smaller.'));return}const r=new FileReader();r.onload=()=>resolve(String(r.result||''));r.onerror=()=>reject(new Error('Unable to read the review image.'));r.readAsDataURL(file)})
}
async function submitCustomerReview(e,ticketId){
 e.preventDefault();state=load();const t=state.tickets.find(x=>x.id===ticketId);if(!t||t.technicalStatus!=='Resolved by Customer'){notify('A review can only be submitted after customer-confirmed resolution.','error');return}
 if(reviewForTicket(t)){notify('A review has already been submitted for this ticket.','error');return}
 try{
  const rating=Number($('#reviewRating').value),displayName=$('#reviewName').value.trim(),company=$('#reviewCompany').value.trim(),text=$('#reviewText').value.trim(),permission=$('#reviewPermission').checked;
  if(!rating||!displayName||!text||!permission)throw new Error('Complete the rating, display name, review, and permission checkbox.');
  const imageDataUrl=await readReviewImage($('#reviewImage').files?.[0]);
  const r={id:uid('review'),ticketId:t.id,rating,displayName,company,text,permission,imageDataUrl,productCategory:t.groups.map(g=>g.categoryName).join(', '),technicalId:t.techAssignedTo,technicalName:user(t.techAssignedTo)?.name||t.techAssignedName||'',status:'Pending',submittedAt:Date.now(),approvedAt:null,rejectedAt:null,publishedAt:null};
  state.reviews.unshift(r);t.reviewId=r.id;log('Customer review submitted for '+t.id+'.');save(state);showTracking(t,false);notify('Review submitted for Main Admin approval.','success')
 }catch(err){notify(err.message,'error')}
}

function handleSelected(e){
 const b=e.target.closest('button');if(!b)return;const t=state.tickets.find(x=>x.id===selectedTicketId);if(!t)return;
 if(b.dataset.s==='verify'){openVerify(t);return}
 if(b.dataset.s==='details'){showDetails(t);return}
 if(b.dataset.s==='turnover'){openTurnoverDialog(t,false,false);return}
 if(b.dataset.s==='return'){openTurnoverDialog(t,true,false);return}
 if(b.dataset.s==='force'){openTurnoverDialog(t,false,true);return}
 if(b.dataset.s==='accept-turnover'){acceptTurnover(t);return}
 if(b.dataset.s==='decline-turnover'){declineTurnover(t);return}
 if(b.dataset.s==='cancel-turnover'){cancelTurnover(t);return}
 if(b.dataset.s==='confirm-suite'){confirmSuite(t);return}
 if(b.dataset.s==='quotation'){openQuotationDialog(t);return}
 if(b.dataset.s==='chat'){t.chatAssignedAt=Date.now();log(t.id+' initial Business Suite assignment confirmed.')}
 if(b.dataset.s==='reply'){t.firstReplyAt=Date.now();t.technicalStatus='In Progress';log(t.id+' first reply sent.')}
 if(b.dataset.s==='waiting'){t.technicalStatus='Waiting Customer';log(t.id+' waiting customer.')}
 if(b.dataset.s==='request-resolution'){
  t.technicalStatus='Waiting for Customer Resolution';t.resolutionRequestedAt=Date.now();t.resolutionRequestedBy=currentUser.id;
  t.resolutionHistory.unshift({action:'Resolution Confirmation Requested',at:t.resolutionRequestedAt,userId:currentUser.id});

 }
 if(b.dataset.s==='force-close'){
  const reason=prompt('Main Admin force-close reason:');if(reason===null)return;if(!reason.trim()){notify('A force-close reason is required.','error');return}
  t.technicalStatus='Force Closed';t.forceCloseReason=reason.trim();t.resolvedAt=Date.now();t.resolvedByCustomer=false;
  t.resolutionHistory.unshift({action:'Force Closed',reason:reason.trim(),at:t.resolvedAt,userId:currentUser.id});
  log(t.id+' force closed by Main Admin.')
 }
 t.lastUpdatedAt=Date.now();save(state);renderData(currentUser.role==='admin');notify('Ticket updated.','success')
}

function openQuotationDialog(t){
 const allowed=currentUser.role==='admin'||t.techAssignedTo===currentUser.id;
 if(!allowed){notify('Only the assigned Technical Support or Main Admin can set the quotation.','error');return}
 $('#dialogContent').innerHTML=`<h2 style="margin:0 0 5px">Service Charge / Quotation</h2><p class="muted">${esc(t.id)} · ${esc(t.name)}</p><div class="info">The Serial Validator only checks the purchase record and warranty. The assigned Technical Support or Main Admin enters the final service amount after diagnosis.</div><div class="row" style="margin-top:12px"><label>Charge Status<select id="quotationStatus"><option value="For Technical Assessment" ${t.chargeStatus==='For Technical Assessment'?'selected':''}>For Technical Assessment</option><option value="For Quotation" ${t.chargeStatus==='For Quotation'?'selected':''}>For Quotation — Waiting Customer Approval</option><option value="Quotation Approved" ${t.chargeStatus==='Quotation Approved'?'selected':''}>Quotation Approved</option><option value="Quotation Declined" ${t.chargeStatus==='Quotation Declined'?'selected':''}>Quotation Declined</option></select></label><label>Final Service Amount<input id="quotationAmount" type="number" min="0" step="0.01" value="${esc(t.quotationAmount||'')}" placeholder="0.00"></label></div><label style="margin-top:10px">Assessment / Quotation Notes<textarea id="quotationNotes" maxlength="1000" placeholder="Diagnosis, service coverage, repair inclusions, or quotation details.">${esc(t.quotationNotes||'')}</textarea></label><div class="actions" style="margin-top:12px"><button class="btn btn-primary" id="saveQuotation">Save Charge Status</button></div>`;
 $('#dialog').showModal();$('#saveQuotation').onclick=()=>saveQuotation(t.id)
}
function saveQuotation(ticketId){
 state=load();const t=state.tickets.find(x=>x.id===ticketId);if(!t)return;
 const status=$('#quotationStatus').value,amount=$('#quotationAmount').value.trim(),notes=$('#quotationNotes').value.trim();
 if(['For Quotation','Quotation Approved','Quotation Declined'].includes(status)&&(!amount||Number(amount)<=0)){notify('Enter the final service amount.','error');return}
 t.chargeStatus=status;t.quotationAmount=amount;t.quotationNotes=notes;t.quotationCreatedAt=Date.now();t.quotationCreatedBy=currentUser.id;
 if(status==='For Quotation'){t.quotationResponse='';t.quotationRespondedAt=null}
 if(status==='Quotation Approved')t.quotationResponse='Approved';
 if(status==='Quotation Declined')t.quotationResponse='Declined';
 t.lastUpdatedAt=Date.now();log(t.id+' charge status updated to '+status+' by '+currentUser.name+'.');save(state);$('#dialog').close();renderData(currentUser.role==='admin');notify('Service charge status saved.','success')
}

function handleUser(e){const b=e.target.closest('button');if(!b)return;const u=user(b.closest('tr').dataset.id);if(b.dataset.a==='edit'){editUserId=u.id;$('#uName').value=u.name;$('#uRole').value=u.role;$('#uUser').value=u.username;$('#uPass').value=u.password;$('#userTitle').textContent='Edit Account';$('#saveUser').textContent='Save Changes';$('#cancelUser').hidden=false}if(b.dataset.a==='delete'){if(!confirm('Delete '+u.name+'?'))return;state.tickets.forEach(t=>{if(u.role==='tracer'&&t.verificationAssignedTo===u.id&&t.verificationStatus!=='Complete'){t.verificationAssignedTo=null;t.verificationStatus='Pending';offerTrace(t,[u.id])}if(u.role==='tech'){if(t.turnoverPending?.toUserId===u.id||t.turnoverPending?.fromUserId===u.id){const h=t.turnoverHistory?.find(x=>x.id===t.turnoverPending.id);if(h){h.status='Cancelled';h.cancelledAt=Date.now();h.cancelledBy=currentUser.id}t.turnoverPending=null}if(t.techAssignedTo===u.id&&!isResolvedStatus(t.technicalStatus)){t.techAssignedTo=null;t.techAssignedName=null;t.technicalStatus='Ready for Technical Support';t.temporaryAssignment=null;offerTech(t,[u.id])}}});state.users=state.users.filter(x=>x.id!==u.id);save(state);renderData(true);notify('Account deleted.','success')}}
function renderCats(){$('#catRows').innerHTML=cats().map(c=>`<tr data-id="${c.id}"><td><b>${esc(c.name)}</b></td><td>${esc(c.trackingType)}</td><td>${c.warrantyMonths} months</td><td>${c.requireSO?'Yes':'No'}</td><td>${c.requireReleaseDate?'Yes':'No'}</td><td><div class="actions"><button class="btn btn-light btn-sm" data-a="edit">Edit</button><button class="btn btn-danger btn-sm" data-a="delete">Delete</button></div></td></tr>`).join('')}function resetCat(){editCategoryId=null;$('#catForm').reset();$('#catTitle').textContent='Add Product Category';$('#saveCat').textContent='Add Category';$('#cancelCat').hidden=true}function saveCat(e){e.preventDefault();const name=$('#catName').value.trim(),trackingType=$('#catType').value,warrantyMonths=Number($('#catMonths').value||0),requireSO=$('#catSO').value==='yes',requireReleaseDate=$('#catDate').value==='yes';if(!name)return;if(editCategoryId)Object.assign(cat(editCategoryId),{name,trackingType,warrantyMonths,requireSO,requireReleaseDate});else cats().push({id:uid('c'),name,trackingType,warrantyMonths,requireSO,requireReleaseDate});save(state);resetCat();renderData(true);notify('Category saved.','success')}function handleCat(e){const b=e.target.closest('button');if(!b)return;const c=cat(b.closest('tr').dataset.id);if(b.dataset.a==='edit'){editCategoryId=c.id;$('#catName').value=c.name;$('#catType').value=c.trackingType;$('#catMonths').value=c.warrantyMonths;$('#catSO').value=c.requireSO?'yes':'no';$('#catDate').value=c.requireReleaseDate?'yes':'no';$('#catTitle').textContent='Edit Category';$('#saveCat').textContent='Save Changes';$('#cancelCat').hidden=false}if(b.dataset.a==='delete'){if(cats().length===1){notify('At least one category required.','error');return}if(confirm('Delete '+c.name+' from future forms?')){state.settings.productCategories=cats().filter(x=>x.id!==c.id);save(state);renderData(true)}}}
function renderSales(){$('#salesRows').innerHTML=sales().map(s=>`<tr data-id="${s.id}"><td><b>${esc(s.name)}</b></td><td><span class="status ${s.active?'status-complete':'status-chargeable'}">${s.active?'Active':'Inactive'}</span></td><td>${state.tickets.filter(t=>t.salesRepId===s.id).length}</td><td><div class="actions"><button class="btn btn-light btn-sm" data-a="edit">Edit</button><button class="btn btn-outline btn-sm" data-a="toggle">${s.active?'Set Inactive':'Set Active'}</button><button class="btn btn-danger btn-sm" data-a="delete">Delete</button></div></td></tr>`).join('')}function resetSales(){editSalesId=null;$('#salesForm').reset();$('#salesTitle').textContent='Add Sales Representative';$('#saveSales').textContent='Add Sales';$('#cancelSales').hidden=true}function saveSales(e){e.preventDefault();const name=$('#salesName').value.trim();if(!name)return;if(editSalesId){const s=sales().find(x=>x.id===editSalesId);s.name=name;s.active=true;state.tickets.forEach(t=>{if(t.salesRepId===s.id)t.salesRepName=name})}else sales().push({id:uid('s'),name,active:true});save(state);resetSales();renderData(true);notify('Sales saved.','success')}function handleSales(e){const b=e.target.closest('button');if(!b)return;const s=sales().find(x=>x.id===b.closest('tr').dataset.id);if(b.dataset.a==='edit'){editSalesId=s.id;$('#salesName').value=s.name;$('#salesTitle').textContent='Edit Sales';$('#saveSales').textContent='Save Changes';$('#cancelSales').hidden=false}if(b.dataset.a==='toggle'){s.active=!s.active;save(state);renderData(true)}if(b.dataset.a==='delete'&&confirm('Delete '+s.name+' from future forms?')){state.settings.salesRepresentatives=sales().filter(x=>x.id!==s.id);save(state);renderData(true)}}
function handleLogo(e){const f=e.target.files?.[0];if(!f)return;if(!['image/jpeg','image/png','image/webp'].includes(f.type)||f.size>1024*1024){notify('Logo must be JPG/PNG/WEBP and 1 MB max.','error');return}const r=new FileReader();r.onload=()=>{state.settings.logoDataUrl=String(r.result);$('#previewLogo').innerHTML=`<img src="${state.settings.logoDataUrl}">`};r.readAsDataURL(f)}function saveSettings(){const name=$('#webName').value.trim(),sub=$('#webSub').value.trim(),url=$('#pageUrl').value.trim(),sla=Number($('#sla').value);if(!name||!sub){notify('Name and subtitle required.','error');return}if(url&&!/^https?:\/\//i.test(url)){notify('Invalid Page URL.','error');return}if(!Number.isFinite(sla)||sla<5||sla>1440){notify('SLA must be 5-1440.','error');return}Object.assign(state.settings,{websiteName:name,websiteSubtitle:sub,pageUrl:url,slaMinutes:sla});save(state);applyBrand();notify('Settings saved.','success')}

function exportCSV(){
 const rows=[['Ticket','Customer','Sales','Products','Units','Verification','Classification','Charge Status','Quotation Amount','Quotation Response','Technical Status','Resolved By Customer','Current Technical','Technical Staff Status','Turnover Count','Business Suite Reassignment','Review Status']];
 state.tickets.forEach(t=>{const tech=user(t.techAssignedTo),review=reviewForTicket(t);rows.push([t.id,t.name,t.salesRepName,products(t),units(t),t.verificationStatus,t.overallServiceClass,t.chargeStatus||'Not Required',t.quotationAmount||'',t.quotationResponse||'',t.technicalStatus,t.resolvedByCustomer?'Yes':'No',tech?.name||t.techAssignedName||'',tech?.staffStatus||'',(t.turnoverHistory||[]).length,t.chatReassignmentPending?(t.chatReassignmentPending.confirmedAt?'Confirmed':'Pending'):'Not Required',review?.status||''])});
 const csv=rows.map(r=>r.map(v=>'"'+String(v).replaceAll('"','""')+'"').join(',')).join('\n'),a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='support-v9.csv';a.click()
}
$('#dialogClose').onclick=()=>$('#dialog').close();$('#dialog').addEventListener('click',e=>{if(e.target===$('#dialog'))$('#dialog').close()});window.addEventListener('storage',e=>{if(e.key!==KEY)return;state=load();if(currentUser&&!editing())renderData(currentUser.role==='admin');if(trackedId&&!editing())refreshTrack(false);renderPublicReviews()});state=load();const p=new URLSearchParams(location.search).get('portal');if(p==='customer')renderCustomer();else if(p==='admin'){currentUser=user(sessionStorage.getItem(SESSION));currentUser?renderAdmin():renderLogin()}else renderLauncher();
})();
</script></body></html>
